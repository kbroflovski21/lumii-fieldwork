<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lumii Fieldwork Agentic Mock</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f5f4;
      --ink: #17211c;
      --muted: #66736d;
      --line: #d7ded9;
      --panel: #ffffff;
      --panel-2: #f9fbfa;
      --green: #1f7a5a;
      --blue: #2d6cdf;
      --red: #b23a48;
      --gold: #9a6a15;
      --teal: #247f86;
      --shadow: 0 14px 34px rgba(31, 42, 36, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: 0;
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-rows: 58px 1fr;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.92);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 34px;
      height: 34px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: #183a2d;
      color: #fff;
      font-weight: 800;
      font-size: 15px;
    }

    .brand h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .brand p {
      margin: 2px 0 0;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .mode-tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .mode-tabs button {
      padding: 7px 10px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .mode-tabs button.active {
      background: #183a2d;
      color: #fff;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px minmax(460px, 1fr) 360px;
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 58px);
    }

    .rail, .workspace, .chat {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      min-width: 0;
      box-shadow: 0 1px 0 rgba(0,0,0,.02);
    }

    .rail {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .rail-head, .panel-head, .chat-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .kicker {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 12px;
    }

    h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.25;
    }

    .flow-list {
      display: grid;
      gap: 7px;
      padding: 10px;
      overflow: auto;
    }

    .flow {
      text-align: left;
      padding: 10px;
      border: 1px solid transparent;
      background: #f7faf8;
      border-radius: 7px;
      color: var(--ink);
    }

    .flow.active {
      border-color: #1f7a5a;
      background: #eef8f3;
    }

    .flow strong {
      display: block;
      font-size: 13px;
      line-height: 1.25;
    }

    .flow span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .workspace {
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .status-stack {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: #fff;
      font-size: 12px;
      white-space: nowrap;
    }

    .chip.green { color: var(--green); border-color: #b9dbc9; background: #f0faf4; }
    .chip.blue { color: var(--blue); border-color: #c2d2f4; background: #f1f5ff; }
    .chip.red { color: var(--red); border-color: #edc6cb; background: #fff2f4; }
    .chip.gold { color: var(--gold); border-color: #ead7a9; background: #fff8e6; }
    .chip.teal { color: var(--teal); border-color: #b7dde1; background: #effbfc; }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 14px;
      padding: 14px;
      overflow: auto;
    }

    .main-card, .side-card, .phone, .report {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .main-card {
      min-height: 440px;
    }

    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfb;
    }

    .card-title h3 {
      margin: 0;
      font-size: 15px;
    }

    .card-body {
      padding: 14px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
      min-height: 78px;
    }

    .metric b {
      display: block;
      font-size: 22px;
      line-height: 1;
    }

    .metric span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .steps {
      display: grid;
      gap: 9px;
    }

    .step {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: start;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .num {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: #eef4f1;
      color: #214236;
      font-size: 12px;
      font-weight: 700;
    }

    .step h4 {
      margin: 0;
      font-size: 14px;
    }

    .step p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .action {
      padding: 7px 9px;
      border-radius: 6px;
      background: #183a2d;
      color: #fff;
      font-size: 12px;
      white-space: nowrap;
    }

    .ghost {
      background: #f3f5f4;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .side-stack {
      display: grid;
      gap: 14px;
    }

    .phone {
      width: 100%;
      background: #111;
      padding: 10px;
    }

    .phone-screen {
      border-radius: 14px;
      min-height: 390px;
      background: #f7faf8;
      color: var(--ink);
      overflow: hidden;
    }

    .phone-top {
      padding: 12px;
      background: #173a2c;
      color: #fff;
    }

    .phone-top strong {
      display: block;
      font-size: 14px;
    }

    .phone-top span {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      color: rgba(255,255,255,.72);
    }

    .phone-body {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .mini-card {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .mini-card strong {
      display: block;
      font-size: 13px;
    }

    .mini-card p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .progress {
      height: 8px;
      border-radius: 999px;
      background: #dce5df;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 62%;
      background: #1f7a5a;
    }

    .chat {
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .chat-log {
      padding: 14px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fbfcfb;
    }

    .msg {
      max-width: 92%;
      padding: 10px 11px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 13px;
      line-height: 1.45;
    }

    .msg.agent {
      border-color: #c8ddd2;
      background: #f0faf4;
    }

    .msg.user {
      align-self: flex-end;
      background: #eef3ff;
      border-color: #c9d7fb;
    }

    .link-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .link {
      padding: 6px 8px;
      border-radius: 6px;
      background: #fff;
      border: 1px solid #b9dbc9;
      color: var(--green);
      font-size: 12px;
    }

    .chat-input {
      padding: 12px;
      border-top: 1px solid var(--line);
      background: #fff;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .chat-input input {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px 10px;
      outline: none;
    }

    .chat-input button {
      border-radius: 7px;
      background: #183a2d;
      color: #fff;
      padding: 0 12px;
    }

    .report {
      background: #fff;
    }

    .report .card-body {
      display: grid;
      gap: 10px;
    }

    .trend {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      align-items: end;
      gap: 6px;
      height: 72px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
    }

    .bar {
      border-radius: 5px 5px 0 0;
      background: #2d6cdf;
      min-height: 16px;
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 250px minmax(420px, 1fr);
      }
      .chat {
        grid-column: 1 / -1;
        min-height: 420px;
      }
    }

    @media (max-width: 820px) {
      .topbar {
        align-items: flex-start;
        height: auto;
        padding: 10px;
        flex-direction: column;
      }
      .layout, .content {
        grid-template-columns: 1fr;
      }
      .mode-tabs {
        width: 100%;
        overflow-x: auto;
      }
      .summary-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">LF</div>
        <div>
          <h1>Lumii Fieldwork Agentic Service Mock</h1>
          <p>企业聊天入口 + 外部业务面板 + H5 现场服务</p>
        </div>
      </div>
      <div class="mode-tabs" aria-label="Agent tabs">
        <button class="active" data-agent="管理 Agent">管理 Agent</button>
        <button data-agent="督导 Agent">督导 Agent</button>
        <button data-agent="洞察 Agent">洞察 Agent</button>
        <button data-agent="合规能力">合规能力</button>
      </div>
    </header>

    <main class="layout">
      <aside class="rail">
        <div class="rail-head">
          <p class="kicker">Agentic flows</p>
          <h2>从业务触发到人工确认</h2>
        </div>
        <div class="flow-list" id="flowList"></div>
      </aside>

      <section class="workspace">
        <div class="panel-head">
          <div>
            <p class="kicker" id="panelKicker">管理工作台</p>
            <h2 id="panelTitle">外生电话需求受理</h2>
          </div>
          <div class="status-stack" id="statusStack"></div>
        </div>
        <div class="content">
          <div class="main-card">
            <div class="card-title">
              <h3 id="mainCardTitle">需求结构化与分诊</h3>
              <button class="action" id="primaryAction">确认进入待排班池</button>
            </div>
            <div class="card-body">
              <div class="summary-grid" id="metricGrid"></div>
              <div class="steps" id="steps"></div>
            </div>
          </div>

          <div class="side-stack">
            <div class="phone">
              <div class="phone-screen">
                <div class="phone-top">
                  <strong id="phoneTitle">社工 H5</strong>
                  <span id="phoneSub">今日任务与服务前提示</span>
                </div>
                <div class="phone-body" id="phoneBody"></div>
              </div>
            </div>
            <div class="report">
              <div class="card-title">
                <h3 id="reportTitle">家属 / 运营视角</h3>
                <span class="chip teal" id="reportChip">脱敏</span>
              </div>
              <div class="card-body" id="reportBody"></div>
            </div>
          </div>
        </div>
      </section>

      <aside class="chat">
        <div class="chat-head">
          <p class="kicker">企业聊天通道</p>
          <h2 id="chatTitle">管理 Agent</h2>
        </div>
        <div class="chat-log" id="chatLog"></div>
        <div class="chat-input">
          <input id="chatText" value="明天还有哪些需求没排？" aria-label="chat input">
          <button id="sendBtn">发送</button>
        </div>
      </aside>
    </main>
  </div>

    const state = {
      active: flows[0],
      agent: "管理 Agent"
    };

    function el(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }

    function renderFlowList() {
      const list = document.getElementById("flowList");
      list.innerHTML = "";
      flows.forEach((flow) => {
        const button = el("button", `flow${flow.id === state.active.id ? " active" : ""}`);
        button.innerHTML = `<strong>${flow.id} ${flow.title}</strong><span>${flow.subtitle}</span>`;
        button.addEventListener("click", () => {
          state.active = flow;
          state.agent = flow.agent;
          document.querySelectorAll(".mode-tabs button").forEach((tab) => {
            tab.classList.toggle("active", tab.dataset.agent === state.agent);
          });
          render();
        });
        list.appendChild(button);
      });
    }

    function renderPanel() {
      const flow = state.active;
      document.getElementById("panelKicker").textContent = flow.agent === "合规能力" ? "管理 Agent 下的强边界能力" : `${flow.agent} 工作台`;
      document.getElementById("panelTitle").textContent = flow.title;
      document.getElementById("mainCardTitle").textContent = flow.panel;
      document.getElementById("primaryAction").textContent = flow.action;

      const chips = document.getElementById("statusStack");
      chips.innerHTML = "";
      flow.chips.forEach(([label, color]) => chips.appendChild(el("span", `chip ${color}`, label)));

      const metrics = document.getElementById("metricGrid");
      metrics.innerHTML = "";
      flow.metrics.forEach(([value, label]) => {
        const metric = el("div", "metric");
        metric.innerHTML = `<b>${value}</b><span>${label}</span>`;
        metrics.appendChild(metric);
      });

      const steps = document.getElementById("steps");
      steps.innerHTML = "";
      flow.steps.forEach(([title, body, action], index) => {
        const step = el("div", "step");
        step.innerHTML = `<div class="num">${index + 1}</div><div><h4>${title}</h4><p>${body}</p></div><button class="action ghost">${action}</button>`;
        steps.appendChild(step);
      });
    }

    function renderPhoneAndReport() {
      const flow = state.active;
      document.getElementById("phoneTitle").textContent = flow.agent === "督导 Agent" ? "社工 H5" : "业务移动视图";
      document.getElementById("phoneSub").textContent = flow.agent === "洞察 Agent" ? "家属报告与回访" : "任务、hint、确认和提醒";
      const phone = document.getElementById("phoneBody");
      phone.innerHTML = "";
      flow.phone.forEach(([title, body], index) => {
        const card = el("div", "mini-card");
        card.innerHTML = `<strong>${title}</strong><p>${body}</p>${index === 0 ? '<div class="progress"><span></span></div>' : ""}`;
        phone.appendChild(card);
      });

      document.getElementById("reportTitle").textContent = flow.agent === "洞察 Agent" ? "家属 / 老人洞察" : "运营 / 审核侧影响";
      document.getElementById("reportChip").textContent = flow.agent === "合规能力" ? "可导出" : "脱敏";
      const report = document.getElementById("reportBody");
      report.innerHTML = "";
      flow.report.forEach((item, index) => {
        const card = el("div", "mini-card");
        if (Array.isArray(item)) {
          card.innerHTML = `<strong>${item[0]}</strong><p>${item[1]}</p><div class="trend"><div class="bar" style="height:32px"></div><div class="bar" style="height:44px"></div><div class="bar" style="height:38px"></div><div class="bar" style="height:54px"></div><div class="bar" style="height:61px"></div><div class="bar" style="height:48px"></div></div>`;
        } else {
          card.innerHTML = `<strong>${index === 0 ? "规则" : "边界"}</strong><p>${item}</p>`;
        }
        report.appendChild(card);
      });
    }

    function renderChat() {
      const flow = state.active;
      document.getElementById("chatTitle").textContent = flow.agent === "合规能力" ? "管理 Agent / 合规能力" : flow.agent;
      const log = document.getElementById("chatLog");
      log.innerHTML = "";
      flow.chat.forEach(([kind, text, link]) => {
        const msg = el("div", `msg ${kind}`);
        msg.textContent = text;
        if (link) {
          const row = el("div", "link-row");
          row.appendChild(el("button", "link", link));
          msg.appendChild(row);
        }
        log.appendChild(msg);
      });
    }

    function render() {
      renderFlowList();
      renderPanel();
      renderPhoneAndReport();
      renderChat();
    }

    document.querySelectorAll(".mode-tabs button").forEach((tab) => {
      tab.addEventListener("click", () => {
        state.agent = tab.dataset.agent;
        const first = flows.find((flow) => flow.agent === state.agent);
        if (first) state.active = first;
        document.querySelectorAll(".mode-tabs button").forEach((item) => item.classList.toggle("active", item === tab));
        render();
      });
    });

    document.getElementById("sendBtn").addEventListener("click", () => {
      const input = document.getElementById("chatText");
      const log = document.getElementById("chatLog");
      const user = el("div", "msg user", input.value || "查看当前待办");
      const reply = el("div", "msg agent", "我会先生成草案或打开对应业务面板；涉及派单、导出、发送、关闭等动作会等待人工确认。");
      log.appendChild(user);
      log.appendChild(reply);
      log.scrollTop = log.scrollHeight;
    });

    render();
  </script>
